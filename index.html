<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier Padel Academy</title>
    <title>Premier Padel Academy</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #2d4a3e 0%, #4a6d52 50%, #1a2e20 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .splash-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 1.5s ease-out forwards;
            padding: 2rem;
            text-align: center;
        }

        .logo-gif {
            width: 850px;
            max-width: 98vw;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 2px solid #daa520;
            background-color: white;
            /* In case the GIF has transparency */
        }

        .season-buttons {
            display: flex;
            gap: 1.5rem;
            margin-top: 2.5rem;
            flex-wrap: wrap;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
        }

        .btn-season {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid #daa520;
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .btn-season:hover {
            background: #daa520;
            color: #1a2e20;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(218, 165, 32, 0.4);
            text-shadow: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- Partículas Canvas -->
    <canvas id="particles"
        style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"></canvas>

    <!-- Contenido Splash -->
    <div class="splash-content">
        <img src="premier_padel_dentro_de_cancha.png" alt="Premier Padel Academy Logo" class="logo-gif">
        <div class="season-buttons">
            <a href="dashboard.html" class="btn-season">Temporada 2026</a>
            <a href="temporada-2025.html" class="btn-season">Temporada 2025</a>
        </div>
    </div>

    <script>
        (function () {
            // Corporate colors: Dark greens, gold, white, light green
            const COLORS = ['#2d4a3e', '#4a6d52', '#daa520', '#d4af37', '#ffffff', '#ecf086'];
            // Particle density slightly increased for landing page effect
            const COUNT = 200;
            const canvas = document.getElementById('particles');
            const ctx = canvas.getContext('2d');
            let particles, time = 0;

            function init() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                particles = Array.from({ length: COUNT }, (_, i) => ({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.8,
                    vy: (Math.random() - 0.5) * 0.6,
                    r: 2 + Math.random() * 4,
                    alpha: 0.35 + Math.random() * 0.5,
                    color: COLORS[i % COLORS.length],
                    phase: Math.random() * Math.PI * 2,
                }));
            }

            function draw() {
                const w = canvas.width, h = canvas.height;
                ctx.clearRect(0, 0, w, h);
                time += 0.01; // Slightly faster oscillation for landing page
                for (const p of particles) {
                    p.x += p.vx;
                    p.y += p.vy + Math.sin(time + p.phase) * 0.2;

                    // Wrap-around limits
                    if (p.x < -p.r) p.x = w + p.r;
                    else if (p.x > w + p.r) p.x = -p.r;
                    if (p.y < -p.r) p.y = h + p.r;
                    else if (p.y > h + p.r) p.y = -p.r;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.alpha;
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                requestAnimationFrame(draw);
            }

            init();
            window.addEventListener('resize', init);
            requestAnimationFrame(draw);

        })();
    </script>
</body>

</html>
